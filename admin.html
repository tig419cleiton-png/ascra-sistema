<!DOCTYPE html>
<html lang="pt">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Administrador - ASCRA</title>

  <link rel="stylesheet" href="admin.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

</head>

<body>

  <!-- TOPO -->
  <header class="topo">

    <div class="logo-texto">
      ASCRA Apúlia
    </div>

    <div class="topo-direita">
      Sistema Administrativo
    </div>

  </header>

  <!-- LOGIN -->
  <main
    class="container-login"
    autocomplete="off"
  >

    <div class="caixa-login">

      <!-- ESQUERDA -->
      <div class="lado-esquerdo">

        <h1>
          Área do Administrador
        </h1>

        <p class="subtitulo">
          Acesso exclusivo do administrador
        </p>

        <!-- EMAIL FIXO -->
        <div class="grupo-input">

          <label>Email</label>

          <input
            type="email"
            id="email"
            value="ascraadmin@gmail.com"
            readonly
            autocomplete="off"
          >

        </div>

        <!-- PASSWORD -->
        <div class="grupo-input">

          <label>Palavra-passe</label>

          <input
            type="password"
            id="password"
            value=""
            autocomplete="new-password"
            placeholder="Digite a palavra-passe do administrador"
          >

        </div>

        <!-- ERRO -->
        <p id="mensagemErro" class="mensagem-erro"></p>

        <!-- BOTÕES -->
        <div class="botoes">

          <button
            id="entrar"
            class="btn-entrar"
            type="button"
          >
            Entrar
          </button>

          <a
            href="index.html"
            class="btn-voltar"
          >
            Voltar
          </a>

        </div>

      </div>

      <!-- DIREITA -->
      <div class="lado-direito">

        <img
          src="https://somosipss.pt/ipss_logo/SqMKW4ZYuHDRIWLQ8OS4.png"
          alt="ASCRA"
        >

      </div>

    </div>

  </main>

  <!-- FIREBASE -->
  <script type="module" src="admin.js"></script>

</body>

</html>
