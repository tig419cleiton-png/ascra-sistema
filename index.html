<!DOCTYPE html>
<html lang="pt">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ASCRA Apúlia</title>

  <link rel="stylesheet" href="style.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

</head>

<body>

  <!-- BARRA AZUL -->
  <header class="topo">

    <div class="barra-esquerda">
      ASCRA Apúlia
    </div>

    <div class="barra-direita">
      Sistema Interno
    </div>

  </header>

  <!-- HERO -->
  <section class="hero">

    <!-- ESQUERDA -->
    <div class="hero-esquerda">

      <h1>
        ASCRA Apúlia
      </h1>

      <h2>
        ASCRA - Associação Social Cultural e Recreativa de Apúlia
      </h2>

      <p class="descricao">
        Plataforma interna de gestão de veículos, condutores e requisições da ASCRA.
      </p>

      <!-- CONTACTOS -->
      <div class="contactos">

        <div class="contacto">
          <i class="fa-regular fa-envelope"></i>

          <div>
            <strong>Email</strong>
            <p>ascra.ascra@gmail.com</p>
          </div>
        </div>

        <div class="contacto">
          <i class="fa-solid fa-phone"></i>

          <div>
            <strong>Telefone</strong>
            <p>253961727</p>
          </div>
        </div>

      </div>

      <!-- LOGIN -->
      <div class="grupo-input">

        <label>Email</label>

        <input
          type="email"
          id="email"
          placeholder="Digite o seu email"
          autocomplete="off"
        >

      </div>

      <div class="grupo-input">

        <label>Palavra-passe</label>

        <input
          type="password"
          id="password"
          placeholder="Digite a sua palavra-passe"
          autocomplete="new-password"
        >

      </div>

      <p id="mensagemErro" class="mensagem-erro"></p>

      <div class="botoes-acesso">

        <button id="entrar" class="botao botao-admin" type="button">
          Entrar
        </button>

        <a href="#" id="reset" class="botao botao-funcionario">
          Esqueceu-se da palavra-passe?
        </a>

      </div>

    </div>

    <!-- DIREITA -->
    <div class="hero-direita">

      <div class="slideshow-container">

        <img
          id="slide"
          src="https://somosipss.pt/ipss_logo/SqMKW4ZYuHDRIWLQ8OS4.png"
          alt="ASCRA"
        >

      </div>

    </div>

  </section>

  <script>

    const imagens = [

      "https://somosipss.pt/ipss_logo/SqMKW4ZYuHDRIWLQ8OS4.png",

      "https://e24.pt/wp-content/uploads/2023/07/NMC03948-scaled-1.jpg",

      "https://ominho.pt/wp-content/uploads/2018/02/ascra.jpg",

      "https://www.municipio.esposende.pt/thumbs/cmesposende/uploads/news/image/7365/sedcsv_1_1024_2500.jpg"

    ];

    let indiceAtual = 0;

    const slide = document.getElementById("slide");

    function trocarImagem() {

      indiceAtual++;

      if (indiceAtual >= imagens.length) {
        indiceAtual = 0;
      }

      slide.style.opacity = 0;

      setTimeout(() => {

        slide.src = imagens[indiceAtual];

        slide.style.opacity = 1;

      }, 300);

    }

    setInterval(trocarImagem, 4000);

  </script>

  <!-- LOGIN -->
  <script type="module" src="login.js"></script>

</body>
</html>
